# Self-Distillation Fine-Tuning (SDFT) Configuration
# ---------------------------------------------------
# Based on: "Self-Distillation Enables Continual Learning" (arXiv:2601.19897)
#
# Uses the same model as both teacher and student:
#   - Student: conditioned on question only
#   - Teacher: conditioned on question + demonstration (in-context learning)
# Teacher weights are an EMA of the student weights.

model:
  # Qwen2.5-3B-Instruct model
  name: "Qwen/Qwen2.5-3B-Instruct"
  # GPU for the student model (trainable)
  student_device: "cuda:6"
  # GPU for the teacher model (EMA, inference-only)
  # Set to the same as student_device to use a single GPU
  teacher_device: "cuda:7"

training:
  num_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  max_seq_length: 1024
  bf16: true
  logging_steps: 10
  save_strategy: "epoch"
  seed: 42
  gradient_checkpointing: true

sdft:
  ema_decay: 0.999              # EMA decay rate for teacher weights (paper default)
  max_new_tokens: 1024          # max tokens per on-policy rollout
  temperature: 0.7              # sampling temperature for rollouts
