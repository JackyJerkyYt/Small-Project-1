# DPO Naive: 8 examples x 8 rollouts, 1 pair per example, 8 pairs per batch

model:
  name: "Qwen/Qwen2.5-3B-Instruct"
  device: [0, 7]

training:
  num_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 16   # effective batch = 2 x 16 = 32 pairs = 64 sequences
  learning_rate: 5.0e-6
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  bf16: true
  logging_steps: 10
  save_strategy: "epoch"
  seed: 42
  gradient_checkpointing: true

dpo:
  beta: 0.1
  max_length: 2048
  max_prompt_length: 512
  loss_type: "sigmoid"
  num_generations: 8
  generation_batch_size: 8
  generation_temperature: 0.7
  max_new_tokens: 1024
  min_correct: 1
  min_incorrect: 1
  num_pairs_per_batch: 8
  pair_mode: "per_example"
